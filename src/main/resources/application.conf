ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.petrescue.ApplicationKt.module ]
    }
}

app {
    storage {
        # "local" or "r2"
        type = "local"
        type = ${?STORAGE_TYPE}
        localPath = "uploads"
        r2 {
            endpoint = ${?R2_ENDPOINT}
            bucket = ${?R2_BUCKET}
            accessKey = ${?R2_ACCESS_KEY}
            secretKey = ${?R2_SECRET_KEY}
            publicUrl = ${?R2_PUBLIC_URL}
        }
    }
    database {
        url = "jdbc:h2:file:./data/petrescue;MODE=PostgreSQL;AUTO_SERVER=TRUE"
        driver = "org.h2.Driver"
    }
}
